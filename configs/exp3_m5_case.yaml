name: exp3_m5_case
dataset: D1
methods:
  - PCRC
seeds:
  - 7
  - 11
  - 19
  - 23
  - 29
nominal_alpha: 0.1
rounds: 60
calibration_budget: 512
action_grid:
  - 0.85
  - 0.925
  - 1.0
  - 1.075
  - 1.15
